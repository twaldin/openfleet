<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenFleet Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --bg-surface: #161b22;
  --bg-elevated: #1c2129;
  --border: #30363d;
  --border-focus: #58a6ff;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --text-dim: #484f58;
  --green: #3fb950;
  --green-dim: #238636;
  --blue: #58a6ff;
  --blue-dim: #1f6feb;
  --red: #f85149;
  --red-dim: #da3633;
  --orange: #d29922;
  --purple: #bc8cff;
  --font: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace;
  --radius: 8px;
  --radius-sm: 4px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ===== LAYOUT ===== */

.app {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text);
}

.logo span {
  color: var(--blue);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--text-muted);
}

.status-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 6px;
}

.status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
.status-dot.warn { background: var(--orange); }
.status-dot.dead { background: var(--red); }

.fleet-count {
  font-variant-numeric: tabular-nums;
}

/* Main grid */
.main {
  display: grid;
  grid-template-columns: 260px 1fr 1fr;
  grid-template-rows: 1fr 280px;
  grid-template-areas:
    "sidebar pane pane"
    "sidebar events events";
  overflow: hidden;
  min-height: 0;
}

/* Sidebar: agent list */
.sidebar {
  grid-area: sidebar;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  padding: 10px 16px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.panel-header .count {
  font-weight: 400;
  color: var(--text-dim);
}

.agent-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}

.agent-section + .agent-section {
  border-top: 1px solid rgba(48, 54, 61, 0.7);
}

.agent-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 16px 6px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.agent-section-title-group {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.agent-section-title {
  min-width: 0;
}

.agent-section-count-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  padding: 1px 7px;
  border-radius: 999px;
  background: rgba(139, 148, 158, 0.16);
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

.agent-section-toggle {
  width: 100%;
  border: 0;
  background: transparent;
  color: inherit;
  font: inherit;
  cursor: pointer;
}

.agent-section-toggle:hover {
  background: rgba(255, 255, 255, 0.02);
}

.agent-section-toggle-label {
  font-size: 10px;
  color: var(--text-dim);
}

.agent-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  cursor: pointer;
  transition: background 0.12s;
  border-left: 2px solid transparent;
}

.agent-item:hover {
  background: var(--bg-elevated);
}

.agent-item.selected {
  background: var(--bg-elevated);
  border-left-color: var(--blue);
}

.agent-item.compact {
  padding-top: 6px;
  padding-bottom: 6px;
}

.agent-item.compact .agent-name {
  font-size: 12px;
}

.agent-item.compact .agent-meta {
  font-size: 10px;
}

.agent-summary-row {
  padding: 8px 16px;
  font-size: 11px;
  color: var(--text-dim);
  border-top: 1px dashed rgba(48, 54, 61, 0.6);
}

.agent-status-indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.agent-status-indicator.alive { background: var(--green); box-shadow: 0 0 4px var(--green); }
.agent-status-indicator.dormant { background: var(--text-dim); }
.agent-status-indicator.dead { background: var(--red); opacity: 0.6; }
.agent-status-indicator.past { background: var(--text-dim); opacity: 0.85; }

.agent-info {
  flex: 1;
  min-width: 0;
}

.agent-name {
  font-weight: 500;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.agent-meta {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.agent-role-badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 500;
  flex-shrink: 0;
}

.agent-role-badge.persistent { background: var(--green-dim); color: var(--green); }
.agent-role-badge.ephemeral { background: rgba(88, 166, 255, 0.15); color: var(--blue); }

/* Spawn button area */
.spawn-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-elevated);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.12s;
}

.btn:hover { border-color: var(--text-muted); background: var(--bg-surface); }
.btn.primary { border-color: var(--blue-dim); background: var(--blue-dim); color: #fff; }
.btn.primary:hover { background: var(--blue); }
.btn.full-width { width: 100%; }

/* Pane viewer */
.pane-area {
  grid-area: pane;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.pane-viewer {
  flex: 1;
  overflow: auto;
  padding: 8px 10px;
  background: #010409;
  font-size: 11px;
  line-height: 1.25;
  white-space: pre;
  overflow-x: hidden;
  color: #c9d1d9;
  min-height: 0;
  cursor: text;
}
.pane-viewer:focus {
  outline: 1px solid var(--border-focus);
}
.pane-viewer .cursor-line {
  background: rgba(88, 166, 255, 0.08);
}

.pane-viewer .empty {
  color: var(--text-dim);
  font-style: italic;
  padding: 40px 0;
  text-align: center;
}

/* ANSI color support */
.ansi-bold { font-weight: 700; }
.ansi-dim { opacity: 0.6; }
.ansi-italic { font-style: italic; }
.ansi-underline { text-decoration: underline; }
.ansi-black { color: #484f58; }
.ansi-red { color: #f85149; }
.ansi-green { color: #3fb950; }
.ansi-yellow { color: #d29922; }
.ansi-blue { color: #58a6ff; }
.ansi-magenta { color: #bc8cff; }
.ansi-cyan { color: #39d4e0; }
.ansi-white { color: #e6edf3; }
.ansi-bright-black { color: #6e7681; }
.ansi-bright-red { color: #ff7b72; }
.ansi-bright-green { color: #56d364; }
.ansi-bright-yellow { color: #e3b341; }
.ansi-bright-blue { color: #79c0ff; }
.ansi-bright-magenta { color: #d2a8ff; }
.ansi-bright-cyan { color: #56d4dd; }
.ansi-bright-white { color: #ffffff; }
.ansi-bg-black { background: #484f58; }
.ansi-bg-red { background: var(--red-dim); }
.ansi-bg-green { background: var(--green-dim); }
.ansi-bg-yellow { background: #5c4813; }
.ansi-bg-blue { background: var(--blue-dim); }
.ansi-bg-magenta { background: #6e40aa; }
.ansi-bg-cyan { background: #1b5e6e; }
.ansi-bg-white { background: #8b949e; }

.pane-input {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg-surface);
  flex-shrink: 0;
}

.pane-input input {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  outline: none;
  transition: border-color 0.12s;
}

.pane-input input:focus { border-color: var(--border-focus); }
.pane-input input::placeholder { color: var(--text-dim); }

/* Bottom row: events */
.bottom-right {
  grid-area: events;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.event-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 4px 0;
}

.event-item {
  display: flex;
  gap: 8px;
  padding: 4px 12px;
  font-size: 11px;
  line-height: 1.5;
  border-bottom: 1px solid rgba(48, 54, 61, 0.3);
  overflow: hidden;
}

.event-time {
  color: var(--text-dim);
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
  width: 42px;
}

.event-type {
  color: var(--blue);
  flex-shrink: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.event-agent {
  color: var(--green);
  flex-shrink: 0;
  min-width: 90px;
}

.event-detail {
  color: var(--text-muted);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Cron bar (footer) */
.cron-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg-surface);
  font-size: 11px;
  color: var(--text-muted);
  overflow-x: auto;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.cron-label {
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-right: 6px;
  flex-shrink: 0;
}

.cron-item {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(48, 54, 61, 0.5);
  white-space: nowrap;
  flex-shrink: 0;
}

.cron-item .cron-sched {
  color: var(--text-dim);
}

/* Login overlay */
.login-overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(1, 4, 9, 0.86);
  backdrop-filter: blur(8px);
  z-index: 200;
}

.login-overlay.open { display: flex; }

.login-panel {
  width: 420px;
  max-width: 100%;
  padding: 24px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-surface);
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
}

.login-panel h2 {
  font-size: 18px;
  margin-bottom: 8px;
}

.login-panel p {
  color: var(--text-muted);
  margin-bottom: 16px;
}

.login-panel label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.login-panel input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
}

.login-panel input:focus {
  outline: none;
  border-color: var(--border-focus);
}

.login-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 16px;
}

.login-error {
  min-height: 18px;
  margin-top: 10px;
  color: var(--red);
  font-size: 11px;
}

.login-help {
  margin-top: 14px;
  font-size: 11px;
  color: var(--text-dim);
}

/* Spawn modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  width: 400px;
  max-width: 90vw;
}

.modal h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 16px;
}

.modal label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
  margin-top: 12px;
}

.modal label:first-of-type { margin-top: 0; }

.modal input, .modal select {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  outline: none;
}

.modal input:focus, .modal select:focus { border-color: var(--border-focus); }

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
}

/* Scrollbars */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ===== RESPONSIVE ===== */

@media (max-width: 768px) {
  .main {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr auto auto;
  }
  .sidebar {
    grid-row: auto;
    border-right: none;
    border-bottom: 1px solid var(--border);
    max-height: 200px;
  }
  .pane-area { min-height: 300px; }
  .bottom-left { border-right: none; }
}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">Open<span>Fleet</span></div>
    </div>
    <div class="header-right">
      <span id="fleet-status"><span class="status-dot live"></span>Connecting...</span>
      <span class="fleet-count" id="fleet-count">&mdash;</span>
      <span id="uptime">&mdash;</span>
    </div>
  </header>

  <!-- Main grid -->
  <div class="main">

    <!-- Sidebar: agents -->
    <div class="sidebar">
      <div class="panel-header">Agents <span class="count" id="agent-count">0</span></div>
      <div class="agent-list" id="agent-list"></div>
      <div class="spawn-area">
        <button class="btn full-width" id="spawn-btn">+ Spawn Agent</button>
      </div>
    </div>

    <!-- Pane viewer -->
    <div class="pane-area">
      <div class="panel-header" id="pane-header">Terminal &mdash; select an agent</div>
      <div class="pane-viewer" id="pane-viewer">
        <div class="empty">Select an agent to view its terminal output</div>
      </div>
      <div class="pane-input">
        <input type="text" id="msg-input" placeholder="Send message to agent..." disabled>
        <button class="btn primary" id="msg-send" disabled>Send</button>
      </div>
    </div>

    <!-- Bottom: events -->
    <div class="bottom-right">
      <div class="panel-header">Events</div>
      <div class="event-list" id="event-list"></div>
    </div>

  </div>

  <!-- Cron bar -->
  <div class="cron-bar" id="cron-bar">
    <span class="cron-label">Cron</span>
  </div>

</div>

<div class="login-overlay" id="login-overlay">
  <div class="login-panel">
    <h2>Dashboard Login</h2>
    <p>Enter the OpenFleet dashboard token from <code>openfleet auth show-token</code>.</p>
    <label for="login-token">Bearer Token</label>
    <input type="password" id="login-token" placeholder="64-char dashboard token" autocomplete="off" spellcheck="false">
    <div class="login-error" id="login-error"></div>
    <div class="login-actions">
      <button class="btn primary" id="login-submit">Unlock Dashboard</button>
    </div>
    <div class="login-help">Stored locally in this browser via <code>localStorage</code>.</div>
  </div>
</div>

<!-- Spawn modal -->
<div class="modal-overlay" id="spawn-modal">
  <div class="modal">
    <h3>Spawn Agent</h3>
    <label>Name</label>
    <input type="text" id="spawn-name" placeholder="e.g., coder-auth">
    <label>Harness</label>
    <select id="spawn-harness">
      <option value="claude-code">claude-code</option>
      <option value="codex">codex</option>
      <option value="opencode">opencode</option>
    </select>
    <label>Model</label>
    <input type="text" id="spawn-model" placeholder="opus-4.6" value="opus-4.6">
    <label>Working Directory</label>
    <input type="text" id="spawn-dir" placeholder="~/project">
    <label>Bootstrap Prompt (optional)</label>
    <input type="text" id="spawn-bootstrap" placeholder="Read CLAUDE.md and begin...">
    <div class="modal-actions">
      <button class="btn" id="spawn-cancel">Cancel</button>
      <button class="btn primary" id="spawn-confirm">Spawn</button>
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";

  // --- State ---
  const TOKEN_STORAGE_KEY = "openfleet.dashboard.token";
  let selectedAgent = null;
  let paneRefreshTimer = null;
  let agents = [];
  let pastAgentsExpanded = false;
  let authToken = loadStoredToken();
  let streamSource = null;

  // --- DOM refs ---
  const $agentList = document.getElementById("agent-list");
  const $agentCount = document.getElementById("agent-count");
  const $paneHeader = document.getElementById("pane-header");
  const $paneViewer = document.getElementById("pane-viewer");
  const $msgInput = document.getElementById("msg-input");
  const $msgSend = document.getElementById("msg-send");
  const $eventList = document.getElementById("event-list");
  const $cronBar = document.getElementById("cron-bar");
  const $fleetStatus = document.getElementById("fleet-status");
  const $fleetCount = document.getElementById("fleet-count");
  const $uptime = document.getElementById("uptime");
  const $spawnModal = document.getElementById("spawn-modal");
  const $loginOverlay = document.getElementById("login-overlay");
  const $loginToken = document.getElementById("login-token");
  const $loginError = document.getElementById("login-error");
  const $loginSubmit = document.getElementById("login-submit");

  // --- Auth ---

  function loadStoredToken() {
    try {
      return localStorage.getItem(TOKEN_STORAGE_KEY) || "";
    } catch {
      return "";
    }
  }

  function setStoredToken(token) {
    authToken = (token || "").trim();
    try {
      if (authToken) localStorage.setItem(TOKEN_STORAGE_KEY, authToken);
      else localStorage.removeItem(TOKEN_STORAGE_KEY);
    } catch {}
  }

  function openLogin(message) {
    if (streamSource) {
      streamSource.close();
      streamSource = null;
    }
    if (paneRefreshTimer) {
      clearInterval(paneRefreshTimer);
      paneRefreshTimer = null;
    }
    $loginOverlay.classList.add("open");
    $loginError.textContent = message || "";
    $loginToken.value = authToken;
    setTimeout(function() { $loginToken.focus(); }, 0);
  }

  function closeLogin() {
    $loginOverlay.classList.remove("open");
    $loginError.textContent = "";
  }

  function authHeaders(headers) {
    return Object.assign({}, headers || {}, authToken ? { Authorization: "Bearer " + authToken } : {});
  }

  async function apiFetch(url, options) {
    const response = await fetch(url, Object.assign({}, options || {}, {
      headers: authHeaders(options && options.headers),
    }));

    if (response.status === 401) {
      setStoredToken("");
      openLogin("Token rejected. Enter the current dashboard token.");
      throw new Error("Unauthorized");
    }

    return response;
  }

  async function apiFetchJson(url, options) {
    const response = await apiFetch(url, options);
    return response.json();
  }

  async function apiFetchText(url, options) {
    const response = await apiFetch(url, options);
    return response.text();
  }

  async function verifyToken(token) {
    const response = await fetch("/api/status", {
      headers: token ? { Authorization: "Bearer " + token } : {},
    });
    if (response.status === 401) return false;
    if (!response.ok) throw new Error("Dashboard auth check failed");
    return true;
  }

  async function submitLogin() {
    const token = $loginToken.value.trim();
    if (!token) {
      openLogin("Enter a dashboard token.");
      return;
    }

    $loginSubmit.disabled = true;
    $loginError.textContent = "Checking token...";
    try {
      const ok = await verifyToken(token);
      if (!ok) {
        $loginError.textContent = "Invalid token.";
        return;
      }

      setStoredToken(token);
      closeLogin();
      await fetchAll();
      connectSSE();
    } catch {
      $loginError.textContent = "Unable to reach dashboard.";
    } finally {
      $loginSubmit.disabled = false;
    }
  }

  // --- ANSI parser ---
  const ANSI_COLORS = [
    "black", "red", "green", "yellow", "blue", "magenta", "cyan", "white"
  ];

  function parseAnsi(text) {
    const container = document.createDocumentFragment();
    // Match all ANSI escape sequences (SGR, cursor movement, etc)
    // eslint-disable-next-line no-control-regex
    const parts = text.split(/(\x1b\[[0-9;]*[A-Za-z])/);
    let fg = null, bg = null, bold = false, dim = false, italic = false, underline = false;

    for (const part of parts) {
      if (part.startsWith("\x1b[")) {
        const letter = part.slice(-1);
        if (letter !== "m") continue; // only handle SGR, skip cursor moves etc
        const codes = part.slice(2, -1).split(";").map(Number);
        for (let i = 0; i < codes.length; i++) {
          const c = codes[i];
          if (c === 0) { fg = null; bg = null; bold = false; dim = false; italic = false; underline = false; }
          else if (c === 1) bold = true;
          else if (c === 2) dim = true;
          else if (c === 3) italic = true;
          else if (c === 4) underline = true;
          else if (c === 22) { bold = false; dim = false; }
          else if (c === 39) fg = null;
          else if (c === 49) bg = null;
          else if (c >= 30 && c <= 37) fg = ANSI_HEX[c - 30];
          else if (c >= 40 && c <= 47) bg = ANSI_HEX[c - 40];
          else if (c >= 90 && c <= 97) fg = ANSI_BRIGHT_HEX[c - 90];
          else if (c >= 100 && c <= 107) bg = ANSI_BRIGHT_HEX[c - 100];
          // 24-bit color: 38;2;r;g;b or 48;2;r;g;b
          else if (c === 38 && codes[i+1] === 2) { fg = "rgb(" + codes[i+2] + "," + codes[i+3] + "," + codes[i+4] + ")"; i += 4; }
          else if (c === 48 && codes[i+1] === 2) { bg = "rgb(" + codes[i+2] + "," + codes[i+3] + "," + codes[i+4] + ")"; i += 4; }
        }
      } else if (part) {
        const hasStyle = fg || bg || bold || dim || italic || underline;
        if (hasStyle) {
          const span = document.createElement("span");
          let style = "";
          if (fg) style += "color:" + fg + ";";
          if (bg) style += "background:" + bg + ";";
          if (bold) style += "font-weight:700;";
          if (dim) style += "opacity:0.6;";
          if (italic) style += "font-style:italic;";
          if (underline) style += "text-decoration:underline;";
          span.setAttribute("style", style);
          span.textContent = part;
          container.appendChild(span);
        } else {
          container.appendChild(document.createTextNode(part));
        }
      }
    }
    return container;
  }

  const ANSI_HEX = ["#484f58","#f85149","#3fb950","#d29922","#58a6ff","#bc8cff","#39c5cf","#e6edf3"];
  const ANSI_BRIGHT_HEX = ["#6e7681","#ffa198","#56d364","#e3b341","#79c0ff","#d2a8ff","#56d4dd","#ffffff"];

  // --- Rendering ---

  function renderAgents(agentData) {
    agents = agentData;
    $agentList.innerHTML = "";
    $agentCount.textContent = agentData.length;

    const activeAgents = [];
    const pastAgents = [];

    for (const agent of agentData) {
      if (isPastAgent(agent)) pastAgents.push(agent);
      else activeAgents.push(agent);
    }

    renderAgentSection({
      title: "Active Agents",
      agents: activeAgents,
      compact: false,
      collapsible: false,
      expanded: true,
    });

    if (pastAgents.length > 0) {
      const showPastAgents = pastAgentsExpanded || pastAgents.some(function(agent) {
        return agent.name === selectedAgent;
      });
      renderAgentSection({
        title: "Past Agents",
        agents: pastAgents,
        compact: true,
        collapsible: true,
        expanded: showPastAgents,
      });
    }
  }

  function renderEvents(events) {
    $eventList.innerHTML = "";
    for (const evt of events) {
      const el = document.createElement("div");
      el.className = "event-item";
      const t = evt.ts ? new Date(evt.ts) : null;
      const timeStr = t ? (String(t.getHours()).padStart(2, "0") + ":" + String(t.getMinutes()).padStart(2, "0")) : "??:??";
      const detail = summarizeEvent(evt);
      el.innerHTML =
        '<span class="event-time">' + esc(timeStr) + '</span>' +
        '<span class="event-type">' + esc(evt.type || "?") + '</span>' +
        '<span class="event-agent">' + esc(evt.agent_id || "") + '</span>' +
        '<span class="event-detail">' + esc(detail) + '</span>';
      $eventList.appendChild(el);
    }
  }

  function renderCron(crons) {
    $cronBar.innerHTML = '<span class="cron-label">Cron</span>';
    if (!crons.length) {
      const empty = document.createElement("span");
      empty.className = "cron-item";
      empty.textContent = "No cron jobs configured";
      $cronBar.appendChild(empty);
      return;
    }
    for (const c of crons) {
      const lastStr = c.last_fired ? timeAgo(new Date(c.last_fired)) : "never";
      const el = document.createElement("span");
      el.className = "cron-item";
      el.innerHTML = "\u23f0 " + esc(c.id) + ' <span class="cron-sched">' + esc(c.schedule) + " \u00b7 " + esc(lastStr) + '</span>';
      $cronBar.appendChild(el);
    }
  }

  function renderStatus(data) {
    const aliveCount = data.alive_count || 0;
    const totalCount = data.agent_count || 0;
    const dotClass = aliveCount > 0 ? "live" : totalCount > 0 ? "warn" : "dead";
    $fleetStatus.innerHTML = '<span class="status-dot ' + dotClass + '"></span>' + (aliveCount > 0 ? "Online" : "No agents");
    $fleetCount.textContent = aliveCount + "/" + totalCount + " alive";
    $uptime.textContent = "up " + formatDuration(data.uptime_ms || 0);
  }

  function isPastAgent(agent) {
    return agent.role === "ephemeral" && !agent.alive;
  }

  function renderAgentSection(options) {
    const section = document.createElement("div");
    section.className = "agent-section";

    const header = options.collapsible ? document.createElement("button") : document.createElement("div");
    header.className = "agent-section-header" + (options.collapsible ? " agent-section-toggle" : "");
    if (options.collapsible) {
      header.type = "button";
      header.setAttribute("aria-expanded", options.expanded ? "true" : "false");
      header.addEventListener("click", function() {
        pastAgentsExpanded = !pastAgentsExpanded;
        renderAgents(agents);
      });
    }

    const titleGroup = document.createElement("span");
    titleGroup.className = "agent-section-title-group";

    const title = document.createElement("span");
    title.className = "agent-section-title";
    title.textContent = options.title;
    titleGroup.appendChild(title);

    if (options.collapsible) {
      const badge = document.createElement("span");
      badge.className = "agent-section-count-badge";
      badge.textContent = String(options.agents.length);
      titleGroup.appendChild(badge);
    }

    header.appendChild(titleGroup);

    const count = document.createElement("span");
    count.className = options.collapsible ? "agent-section-toggle-label" : "count";
    count.textContent = options.collapsible
      ? (options.expanded ? "Hide" : "Show")
      : String(options.agents.length);
    header.appendChild(count);

    section.appendChild(header);

    if (!options.expanded) {
      $agentList.appendChild(section);
      return;
    }

    for (const agent of options.agents) {
      section.appendChild(renderAgentRow(agent, options.compact));
    }

    if (options.collapsible && options.agents.length === 0) {
      const empty = document.createElement("div");
      empty.className = "agent-summary-row";
      empty.textContent = "No past agents";
      section.appendChild(empty);
    }

    $agentList.appendChild(section);
  }

  function renderAgentRow(agent, compact) {
    const el = document.createElement("div");
    el.className = "agent-item" + (compact ? " compact" : "") + (selectedAgent === agent.name ? " selected" : "");
    el.dataset.name = agent.name;
    el.innerHTML = compact
      ? '<div class="agent-status-indicator past"></div>' +
        '<div class="agent-info">' +
          '<div class="agent-name">' + esc(agent.name) + '</div>' +
          '<div class="agent-meta">' + esc(agent.harness || "?") + '</div>' +
        '</div>'
      : '<div class="agent-status-indicator ' + esc(agent.status || "dead") + '"></div>' +
        '<div class="agent-info">' +
          '<div class="agent-name">' + esc(agent.name) + '</div>' +
          '<div class="agent-meta">' + esc((agent.harness || "?") + " / " + (agent.model || "?")) + '</div>' +
        '</div>' +
        '<span class="agent-role-badge ' + esc(agent.role) + '">' + esc(agent.role) + '</span>';
    el.addEventListener("click", function() { selectAgent(agent.name); });
    return el;
  }

  function summarizeEvent(evt) {
    const payload = evt.payload || {};
    if (evt.type === "task.created" || evt.type === "task.updated") {
      return [payload.title || payload.id || "task", payload.status ? "status=" + payload.status : null, payload.blocked_on ? "blocked_on=" + payload.blocked_on : null].filter(Boolean).join(" | ");
    }
    if (evt.type === "job.created" || evt.type === "job.updated" || evt.type === "job.completed") {
      return [payload.type || payload.id || "job", payload.status ? "status=" + payload.status : null, payload.agent ? "agent=" + payload.agent : null].filter(Boolean).join(" | ");
    }
    if (evt.type === "action.executed") {
      return [payload.action || "action", payload.message || payload.output || null].filter(Boolean).join(" | ");
    }
    if (payload.summary) return payload.summary;
    if (payload.title) return payload.title;
    if (payload.text) return payload.text;
    if (payload.direction) return payload.direction;
    if (payload.job_id) return "job=" + payload.job_id;
    return JSON.stringify(payload).slice(0, 120);
  }

  // --- Agent selection + pane ---

  function selectAgent(name) {
    selectedAgent = name;
    if (agents.some(function(agent) { return agent.name === name && isPastAgent(agent); })) {
      pastAgentsExpanded = true;
    }
    $paneHeader.textContent = "Terminal \u2014 " + name;
    $msgInput.disabled = false;
    $msgInput.placeholder = "Message " + name + "...";
    $msgSend.disabled = false;

    // Re-render agent list to update selection
    renderAgents(agents);

    // Start refreshing pane (faster when focused for live typing feel)
    refreshPane();
    if (paneRefreshTimer) clearInterval(paneRefreshTimer);
    paneRefreshTimer = setInterval(refreshPane, 2000);

    // Make pane focusable for keyboard input
    $paneViewer.tabIndex = 0;
    $paneViewer.focus();
  }

  // Live keyboard forwarding — when pane is focused, keystrokes go to agent
  var keyBuffer = "";
  var keyFlushTimer = null;

  // Also allow clicking the pane to focus it
  $paneViewer.addEventListener("click", function() {
    if (selectedAgent) $paneViewer.focus();
  });

  $paneViewer.addEventListener("keydown", function(e) {
    if (!selectedAgent) return;
    // Don't capture browser shortcuts
    if (e.metaKey || (e.ctrlKey && e.key !== "c")) return;

    e.preventDefault();
    e.stopPropagation();
    var key = "";
    if (e.key === "Enter") key = "\n";
    else if (e.key === "Backspace") key = "\b";
    else if (e.key === "Escape") key = "\x1b";
    else if (e.key === "Tab") key = "\t";
    else if (e.ctrlKey && e.key === "c") key = "\x03";
    else if (e.key.length === 1) key = e.key;
    else return; // ignore F-keys, arrows for now

    // Visual feedback — flash border
    $paneViewer.style.outline = "1px solid var(--green)";
    setTimeout(function() { $paneViewer.style.outline = ""; }, 100);

    keyBuffer += key;
    // Batch keystrokes and flush every 50ms for efficiency
    if (!keyFlushTimer) {
      keyFlushTimer = setTimeout(function() {
        if (keyBuffer && selectedAgent) {
          apiFetch("/api/agents/" + encodeURIComponent(selectedAgent) + "/keys", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ keys: keyBuffer }),
          }).then(function() {
            // Refresh pane immediately after keystroke to see result
            setTimeout(refreshPane, 200);
          });
          keyBuffer = "";
        }
        keyFlushTimer = null;
      }, 50);
    }
  });

  function refreshPane() {
    if (!selectedAgent) return;
    var hadFocus = document.activeElement === $paneViewer;
    apiFetchText("/api/agents/" + encodeURIComponent(selectedAgent) + "/pane")
      .then(function(text) {
        if (!text.trim()) {
          $paneViewer.innerHTML = "";
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No pane output (agent may not have a tmux session)";
          $paneViewer.appendChild(empty);
          return;
        }
        $paneViewer.innerHTML = "";
        $paneViewer.appendChild(parseAnsi(text));
        $paneViewer.scrollTop = $paneViewer.scrollHeight;
        // Restore focus after content replacement
        if (hadFocus) $paneViewer.focus();
      })
      .catch(function() {
        // Silently ignore fetch errors for pane
      });
  }

  // --- Send message ---

  function sendMessage() {
    if (!selectedAgent) return;
    const msg = $msgInput.value.trim();
    if (!msg) return;

    $msgInput.value = "";
    $msgSend.disabled = true;

    apiFetchJson("/api/agents/" + encodeURIComponent(selectedAgent) + "/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg }),
    })
      .then(function(data) {
        $msgSend.disabled = false;
        if (!data.ok) {
          console.error("Send failed:", data.error);
        }
        // Refresh pane immediately after send
        setTimeout(refreshPane, 500);
      })
      .catch(function(e) {
        $msgSend.disabled = false;
        console.error("Send error:", e);
      });
  }

  $msgSend.addEventListener("click", sendMessage);
  $msgInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") sendMessage();
  });

  // --- Spawn modal ---

  document.getElementById("spawn-btn").addEventListener("click", function() {
    $spawnModal.classList.add("open");
    document.getElementById("spawn-name").focus();
  });

  document.getElementById("spawn-cancel").addEventListener("click", function() {
    $spawnModal.classList.remove("open");
  });

  $spawnModal.addEventListener("click", function(e) {
    if (e.target === $spawnModal) $spawnModal.classList.remove("open");
  });

  document.getElementById("spawn-confirm").addEventListener("click", function() {
    var name = document.getElementById("spawn-name").value.trim();
    if (!name) { document.getElementById("spawn-name").focus(); return; }

    var body = {
      name: name,
      harness: document.getElementById("spawn-harness").value,
      model: document.getElementById("spawn-model").value.trim() || undefined,
      dir: document.getElementById("spawn-dir").value.trim() || undefined,
      bootstrap: document.getElementById("spawn-bootstrap").value.trim() || undefined,
    };

    document.getElementById("spawn-confirm").disabled = true;

    apiFetchJson("/api/agents/spawn", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    })
      .then(function(data) {
        document.getElementById("spawn-confirm").disabled = false;
        $spawnModal.classList.remove("open");
        if (data.ok !== false) {
          // Refresh status
          fetchAll();
          selectAgent(name);
        } else {
          console.error("Spawn failed:", data.error);
        }
      })
      .catch(function(e) {
        document.getElementById("spawn-confirm").disabled = false;
        console.error("Spawn error:", e);
      });
  });

  // --- SSE ---

  function connectSSE() {
    if (!authToken) return;
    if (streamSource) streamSource.close();
    var source = new EventSource("/api/stream?token=" + encodeURIComponent(authToken));
    streamSource = source;

    source.addEventListener("status", function(e) {
      try {
        var data = JSON.parse(e.data);
        renderAgents(data.agents || []);
        renderStatus(data);
      } catch {}
    });

    source.addEventListener("events", function(e) {
      try {
        renderEvents(JSON.parse(e.data));
      } catch {}
    });
    
    source.onerror = function() {
      source.close();
      if (streamSource === source) streamSource = null;
      $fleetStatus.innerHTML = '<span class="status-dot dead"></span>Disconnected';
      // Reconnect after 5s
      if (!$loginOverlay.classList.contains("open")) setTimeout(connectSSE, 5000);
    };
  }

  // --- Initial data fetch ---

  function fetchAll() {
    if (!authToken) return Promise.resolve();
    return Promise.all([
      apiFetchJson("/api/status").then(function(data) {
        renderAgents(data.agents || []);
        renderStatus(data);
      }),
      apiFetchJson("/api/events").then(function(data) { renderEvents(data); }),
      apiFetchJson("/api/cron").then(function(data) { renderCron(data); }),
    ]).catch(function() {});
  }

  // Refresh cron periodically (doesn't come via SSE)
  setInterval(function() {
    if (!authToken) return;
    apiFetchJson("/api/cron").then(renderCron).catch(function() {});
  }, 10000);

  $loginSubmit.addEventListener("click", submitLogin);
  $loginToken.addEventListener("keydown", function(e) {
    if (e.key === "Enter") submitLogin();
  });

  // --- Utilities ---

  function esc(str) {
    if (!str) return "";
    var d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function formatDuration(ms) {
    var s = Math.floor(ms / 1000);
    if (s < 60) return s + "s";
    var m = Math.floor(s / 60);
    if (m < 60) return m + "m";
    var h = Math.floor(m / 60);
    var rm = m % 60;
    if (h < 24) return h + "h " + rm + "m";
    var d = Math.floor(h / 24);
    return d + "d " + (h % 24) + "h";
  }

  function timeAgo(date) {
    var diff = Date.now() - date.getTime();
    if (diff < 60000) return "just now";
    if (diff < 3600000) return Math.floor(diff / 60000) + "m ago";
    if (diff < 86400000) return Math.floor(diff / 3600000) + "h ago";
    return Math.floor(diff / 86400000) + "d ago";
  }

  // --- Boot ---
  if (authToken) {
    verifyToken(authToken)
      .then(function(ok) {
        if (!ok) {
          setStoredToken("");
          openLogin("Stored token rejected. Enter the current dashboard token.");
          return;
        }
        closeLogin();
        fetchAll();
        connectSSE();
      })
      .catch(function() {
        openLogin("Unable to reach dashboard.");
      });
  } else {
    openLogin();
  }

})();
</script>
</body>
</html>
